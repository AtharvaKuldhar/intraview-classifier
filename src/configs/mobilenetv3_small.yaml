model:
  name: "mobilenetv3_small"
  timm_name: "mobilenetv3_small_100.lamb_in1k"
  pretrained: true
  num_classes: 8
  
training:
  seed: 42
  batch_size: 32         # very lightweight, easily fits in T4 GPU
  phase1_epochs: 10      # head-only calibration
  phase2_epochs: 40      # full model fine-tuning
  phase1_lr: 1e-3
  phase2_lr: 1e-4
  weight_decay: 0.01
  warmup_epochs: 5
  early_stopping_patience: 7
  gradient_clip_max_norm: 1.0
  amp: true

data:
  data_dir: "data/augmented"
  split_ratios: [0.70, 0.15, 0.15]
  input_size: 224
  num_workers: 2

paths:
  checkpoint_dir: "checkpoints"
  log_dir: "logs"
  experiment_dir: "experiments"
